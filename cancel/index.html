<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cancelar turno — Sallon Bella</title>
  <link rel="stylesheet" href="../css/variables.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 2rem;
    }

    .cancel-card {
      width: 100%;
      max-width: 480px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      padding: 3rem;
      text-align: center;
    }

    .cancel-logo {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 300;
      margin-bottom: 2rem;
      color: var(--text);
    }

    .cancel-logo span { color: var(--gold); }

    .cancel-divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 2rem;
    }

    #estado-loading { color: var(--text-muted); font-size: 0.82rem; }

    .cita-info {
      background: var(--bg-3);
      border: 1px solid var(--border);
      padding: 1.5rem;
      margin: 1.5rem 0;
      text-align: left;
    }

    .cita-info p {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
    }

    .cita-info p strong { color: var(--text); }

    .cancel-warning {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .btn-cancel-confirm {
      width: 100%;
      padding: 1rem;
      background: transparent;
      border: 1px solid rgba(138,58,58,0.5);
      color: #c27a7a;
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 0.75rem;
    }

    .btn-cancel-confirm:hover {
      background: rgba(138,58,58,0.1);
      border-color: #c27a7a;
    }

    .btn-volver {
      display: block;
      font-size: 0.72rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: var(--transition);
      margin-top: 1rem;
    }

    .btn-volver:hover { color: var(--gold); }

    .result-msg {
      padding: 1rem;
      font-size: 0.78rem;
      border-radius: var(--radius);
      display: none;
      margin-top: 1rem;
    }

    .result-msg.success {
      display: block;
      background: rgba(90,138,90,0.1);
      border: 1px solid rgba(90,138,90,0.3);
      color: #7ab87a;
    }

    .result-msg.error {
      display: block;
      background: rgba(138,58,58,0.1);
      border: 1px solid rgba(138,58,58,0.3);
      color: #c27a7a;
    }

    .badge-estado {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 2px;
    }

    .badge-confirmado { background: rgba(90,138,90,0.12); color: #7ab87a; }
    .badge-cancelado  { background: rgba(138,58,58,0.12); color: #c27a7a; }
    .badge-completado { background: rgba(201,168,76,0.12); color: var(--gold); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="cancel-card">
  <div class="cancel-logo">Sallon<span>Bella</span></div>
  <div class="cancel-divider"></div>

  <div id="estado-loading">Verificando tu reserva...</div>

  <div id="cita-container" style="display:none;">
    <h2 style="font-family:var(--font-display);font-size:1.4rem;font-weight:300;margin-bottom:0.5rem;">
      Tu reserva
    </h2>
    <p style="font-size:0.75rem;color:var(--text-muted);margin-bottom:1rem;">
      Revisá los datos antes de cancelar
    </p>

    <div class="cita-info" id="cita-info"></div>

    <div id="acciones-container">
      <p class="cancel-warning">
        Al cancelar tu turno, recibirás una confirmación por email y WhatsApp.
        Esta acción no se puede deshacer.
      </p>
      <button class="btn-cancel-confirm" id="btn-cancelar">
        Cancelar mi turno
      </button>
    </div>

    <div class="result-msg" id="result-msg"></div>
    <a href="/" class="btn-volver">← Volver al inicio</a>
  </div>

  <div id="error-container" style="display:none;">
    <p style="color:var(--text-muted);font-size:0.82rem;margin-bottom:1.5rem;">
      No encontramos esta reserva o el link ya no es válido.
    </p>
    <a href="/" class="btn-volver">← Volver al inicio</a>
  </div>
</div>

<script src="../js/supabase.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const params  = new URLSearchParams(window.location.search);
  const citaId  = params.get('id');
  const loading = document.getElementById('estado-loading');
  const citaCont  = document.getElementById('cita-container');
  const errorCont = document.getElementById('error-container');
  const citaInfo  = document.getElementById('cita-info');
  const resultMsg = document.getElementById('result-msg');
  const accionesCont = document.getElementById('acciones-container');

  if (!citaId) {
    loading.style.display = 'none';
    errorCont.style.display = 'block';
    return;
  }

  // Buscar cita con datos del cliente y servicio
  const { data, error } = await sb
    .from('vista_metricas')
    .select('*')
    .eq('id', citaId)
    .single();

  loading.style.display = 'none';

  if (error || !data) {
    errorCont.style.display = 'block';
    return;
  }

  // Mostrar info de la cita
  const estadoBadge = `<span class="badge-estado badge-${data.estado}">${data.estado}</span>`;

  citaInfo.innerHTML = `
    <p><span>Cliente</span><strong>${data.nombre_completo}</strong></p>
    <p><span>Servicio</span><strong>${data.servicio}</strong></p>
    <p><span>Fecha y hora</span><strong>${formatFecha(data.fecha_hora_local)}</strong></p>
    <p><span>Estado</span>${estadoBadge}</p>
  `;

  citaCont.style.display = 'block';

  // Si ya está cancelada o completada, no mostrar botón
  if (data.estado !== 'confirmado') {
    accionesCont.style.display = 'none';
    resultMsg.textContent = data.estado === 'cancelado'
      ? 'Este turno ya fue cancelado anteriormente.'
      : 'Este turno ya fue completado y no puede cancelarse.';
    resultMsg.className = 'result-msg error';
    return;
  }

  // Acción cancelar
  document.getElementById('btn-cancelar').addEventListener('click', async () => {
    const btn = document.getElementById('btn-cancelar');
    btn.disabled = true;
    btn.textContent = 'Cancelando...';

    const { error: updateError } = await sb
      .from('citas')
      .update({ estado: 'cancelado' })
      .eq('id', citaId);

    if (updateError) {
      resultMsg.textContent = 'Hubo un error al cancelar. Por favor contactanos por WhatsApp.';
      resultMsg.className = 'result-msg error';
      btn.disabled = false;
      btn.textContent = 'Cancelar mi turno';
      return;
    }

    accionesCont.style.display = 'none';
    resultMsg.textContent = `Tu turno de ${data.servicio} del ${formatFecha(data.fecha_hora_local)} fue cancelado. Recibirás confirmación por email y WhatsApp.`;
    resultMsg.className = 'result-msg success';

    // Actualizar badge de estado
    citaInfo.querySelector('p:last-child').innerHTML =
      `<span>Estado</span><span class="badge-estado badge-cancelado">cancelado</span>`;
  });
});
</script>
</body>
</html>
