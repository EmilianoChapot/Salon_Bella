<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cancelar turno — Sallon Bella</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--bg2:#0f0f0f;--bg3:#161616;
  --gold:#C9A84C;--gold-l:#E8C96D;--gold-b:rgba(201,168,76,0.22);
  --text:#F2EDE6;--muted:#6e6860;--dim:#2e2c28;--border:rgba(255,255,255,0.06);
  --suc-bg:rgba(90,138,90,.12);--suc-c:#7ab87a;--suc-b:rgba(90,138,90,.2);
  --err-bg:rgba(138,58,58,.12);--err-c:#c27a7a;--err-b:rgba(138,58,58,.2);
  --fd:'Cormorant Garamond',serif;--fb:'Jost',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-weight:300;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;-webkit-font-smoothing:antialiased}
.card{width:100%;max-width:480px;background:var(--bg2);border:1px solid var(--border);padding:3rem;text-align:center}
.logo{font-family:var(--fd);font-size:1.8rem;font-weight:300;margin-bottom:2rem}
.logo em{color:var(--gold);font-style:italic}
.divider{width:40px;height:1px;background:var(--gold);margin:0 auto 2rem}
#loading{color:var(--muted);font-size:.82rem}
.info-box{background:var(--bg3);border:1px solid var(--border);padding:1.5rem;text-align:left;margin:1.5rem 0;border-radius:3px}
.info-row{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:.6rem}
.info-row:last-child{margin-bottom:0}
.info-row span:first-child{color:var(--muted)}
.info-row span:last-child{color:var(--text);font-weight:400}
.badge{display:inline-block;padding:.22rem .55rem;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;border-radius:2px}
.bc{background:rgba(90,138,90,.12);color:#7ab87a;border:1px solid rgba(90,138,90,.2)}
.bx{background:rgba(138,58,58,.12);color:#c27a7a;border:1px solid rgba(138,58,58,.2)}
.bk{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid var(--gold-b)}
.warn{font-size:.75rem;color:var(--muted);line-height:1.7;margin-bottom:1.5rem}
.btn-cancel{width:100%;padding:.95rem;background:transparent;border:1px solid rgba(138,58,58,.4);color:#c27a7a;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:.35s;font-family:var(--fb);border-radius:3px;margin-bottom:.75rem}
.btn-cancel:hover{background:rgba(138,58,58,.1);border-color:#c27a7a}
.btn-cancel:disabled{opacity:.4}
.msg{padding:.85rem 1rem;font-size:.76rem;border-radius:3px;margin-top:1rem;display:none}
.msg.ok{display:block;background:var(--suc-bg);border:1px solid var(--suc-b);color:var(--suc-c)}
.msg.err{display:block;background:var(--err-bg);border:1px solid var(--err-b);color:var(--err-c)}
.back{display:block;font-size:.68rem;color:var(--muted);text-decoration:none;margin-top:1.2rem;transition:.35s;letter-spacing:.08em}
.back:hover{color:var(--gold)}
#error-view,#actions{display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Sallon<em>Bella</em></div>
  <div class="divider"></div>

  <div id="loading">Verificando tu reserva...</div>

  <div id="cita-view" style="display:none">
    <h2 style="font-family:var(--fd);font-size:1.4rem;font-weight:300;margin-bottom:.4rem">Tu reserva</h2>
    <p style="font-size:.74rem;color:var(--muted);margin-bottom:1rem">Revisa los datos antes de cancelar</p>
    <div class="info-box" id="info-box"></div>
    <div id="actions">
      <p class="warn">Al cancelar tu turno recibirás una confirmación. Esta acción no se puede deshacer.</p>
      <button class="btn-cancel" id="btn-cx">Cancelar mi turno</button>
    </div>
    <div class="msg" id="msg"></div>
    <a href="/" class="back">← Volver al inicio</a>
  </div>

  <div id="error-view">
    <p style="color:var(--muted);font-size:.82rem;margin-bottom:1.5rem">No encontramos esta reserva o el link ya no es valido.</p>
    <a href="/" class="back">← Volver al inicio</a>
  </div>
</div>

<script>
var SB_URL = 'https://glczaecmkniqdmqkvfxc.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsY3phZWNta25pcWRtcWt2ZnhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1OTEyNDcsImV4cCI6MjA5MzE2NzI0N30.2i8E4KX_ocyca-yRT_4fG6y85dpH3J-0f6gOsmn-O2c';
var TZ = 'America/Argentina/Buenos_Aires';
var sb = supabase.createClient(SB_URL, SB_KEY);

function fmtD(iso){
  if(!iso)return '--';
  return new Date(iso).toLocaleString('es-AR',{timeZone:TZ,day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

(async function(){
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  var loading = document.getElementById('loading');
  var citaView = document.getElementById('cita-view');
  var errorView = document.getElementById('error-view');
  var infoBox = document.getElementById('info-box');
  var actions = document.getElementById('actions');
  var msg = document.getElementById('msg');
  var btnCx = document.getElementById('btn-cx');

  if(!id){
    loading.style.display='none';
    errorView.style.display='block';
    return;
  }

  var r = await sb.from('vista_metricas').select('*').eq('id',id).single();
  loading.style.display='none';

  if(r.error||!r.data){
    errorView.style.display='block';
    return;
  }

  var c = r.data;
  var estadoMap = {confirmado:'bc',cancelado:'bx',completado:'bk'};
  var badge = '<span class="badge '+estadoMap[c.estado]+'">'+c.estado+'</span>';

  infoBox.innerHTML =
    '<div class="info-row"><span>Cliente</span><span>'+c.nombre_completo+'</span></div>'+
    '<div class="info-row"><span>Servicio</span><span>'+c.servicio+'</span></div>'+
    '<div class="info-row"><span>Fecha y hora</span><span>'+fmtD(c.fecha_hora_local)+'</span></div>'+
    '<div class="info-row"><span>Estado</span>'+badge+'</div>';

  citaView.style.display='block';

  if(c.estado !== 'confirmado'){
    msg.textContent = c.estado==='cancelado' ? 'Este turno ya fue cancelado anteriormente.' : 'Este turno ya fue completado y no puede cancelarse.';
    msg.className='msg err';
    return;
  }

  actions.style.display='block';

  btnCx.addEventListener('click', async function(){
    if(!confirm('Confirmas la cancelacion de tu turno?'))return;
    btnCx.disabled=true;
    btnCx.textContent='Cancelando...';
    var ru = await sb.from('citas').update({estado:'cancelado'}).eq('id',id);
    if(ru.error){
      msg.textContent='Error al cancelar. Por favor contactanos por WhatsApp.';
      msg.className='msg err';
      btnCx.disabled=false;
      btnCx.textContent='Cancelar mi turno';
    } else {
      actions.style.display='none';
      msg.textContent='Tu turno de '+c.servicio+' del '+fmtD(c.fecha_hora_local)+' fue cancelado correctamente.';
      msg.className='msg ok';
      infoBox.querySelector('.badge').className='badge bx';
      infoBox.querySelector('.badge').textContent='cancelado';
    }
  });
})();
</script>
</body>
</html>
